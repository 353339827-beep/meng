<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="个人主页 - 记录想法、项目与日常">
    <title>主页 | 你的名字</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --border: #1f1f1f;
            --text-primary: #e8e8e8;
            --text-secondary: #888;
            --text-muted: #555;
            --max-width: 640px;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC',
                         'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        header {
            padding: 48px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 450;
            transition: color 0.2s;
        }
        .nav-link:hover { color: #fff; }

        .hero { padding: 60px 0 48px; }

        .hero-name {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .hero-bio {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.75;
        }

        .hero-bio a {
            color: var(--text-primary);
            text-decoration: underline;
            text-decoration-color: var(--border);
            text-underline-offset: 3px;
            transition: color 0.2s, text-decoration-color 0.2s;
        }
        .hero-bio a:hover {
            color: #fff;
            text-decoration-color: var(--text-primary);
        }

        .social-row {
            display: flex;
            gap: 20px;
            margin-top: 28px;
            align-items: center;
            flex-wrap: wrap;
        }
        .social-row a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.88rem;
            transition: color 0.2s;
        }
        .social-row a:hover { color: #fff; }
        .social-row svg { width: 18px; height: 18px; transition: color 0.2s; }
        .social-row .label { display: none; }
        @media (min-width: 480px) { .social-row .label { display: inline; } }

        .section { padding: 40px 0; }

        .section-title {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 20px;
        }

        .article-list {
            display: flex;
            flex-direction: column;
        }

        .article-item {
            display: block;
            padding: 16px 0;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border);
            transition: opacity 0.2s;
        }

        .article-item:last-child { border-bottom: none; }

        .article-item:hover { opacity: 0.7; }

        .article-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .article-title {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .article-excerpt {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.65;
        }

        footer {
            padding: 32px 0 48px;
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        @media (max-width: 640px) {
            .hero-name { font-size: 1.7rem; }
            .hero { padding: 40px 0 32px; }
            header { padding-top: 32px; }
            .article-item { padding: 14px 0; }
            footer { padding: 24px 0 40px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <header>
            <a href="/" class="nav-link">主页</a>
            <a href="/articles" class="nav-link">文章</a>
        </header>

        <section class="hero">
            <h1 class="hero-name">你的名字</h1>
            <p class="hero-bio">
                写代码、写点东西、热爱一切有趣的事物。这里是我的个人主页。
                目前在 <a href="#">某公司</a> 做 <a href="#">某方向</a>，
                业余时间喜欢折腾 <a href="#">开源项目</a> 和 <a href="#">摄影</a>。
            </p>

            <div class="social-row">
                <a href="#" aria-label="GitHub">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
                    <span class="label">GitHub</span>
                </a>
                <a href="#" aria-label="Twitter">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l11.733 16h4.267l-11.733 -16z"/><path d="M4 20l6.768 -6.768m2.46 -2.46L20 4"/></svg>
                    <span class="label">Twitter</span>
                </a>
                <a href="#" aria-label="LinkedIn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
                    <span class="label">LinkedIn</span>
                </a>
                <a href="mailto:hello@example.com" aria-label="Email">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    <span class="label">Email</span>
                </a>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">文章</h2>

            <div class="article-list">
                <a href="#" class="article-item">
                    <div class="article-meta">2026-06-14</div>
                    <div class="article-title">我的第一篇文章</div>
                    <div class="article-excerpt">
                        这是文章摘要。记录一些有意思的想法和收获，篇幅不长，但希望每篇都有价值。
                    </div>
                </a>

                <a href="#" class="article-item">
                    <div class="article-meta">2026-06-10</div>
                    <div class="article-title">用简洁的方式构建个人网站</div>
                    <div class="article-excerpt">
                        一个人网站不需要花哨——好的内容、干净的排版、舒服的阅读体验，就够了。
                    </div>
                </a>

                <a href="#" class="article-item">
                    <div class="article-meta">2026-05-28</div>
                    <div class="article-title">关于设计与工具的随笔</div>
                    <div class="article-excerpt">
                        工具永远只是手段，真正重要的是用它们创造出什么。一些随想。
                    </div>
                </a>
            </div>
        </section>

        <footer>
            &copy; 2026 你的名字
        </footer>

    </div>

</body>
</html>
